name: 🎯 SunnySeeds Sales Funnel Auto-Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install openpyxl requests
      
      - name: Fetch Typeform and update Excel
        env:
          TYPEFORM_API_KEY: ${{ secrets.TYPEFORM_API_KEY }}
          TYPEFORM_FORM_ID: ${{ secrets.TYPEFORM_FORM_ID }}
        run: python scripts/1_fetch_typeform_leads.py
      
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add dashboards/
          git commit -m "Update: $(date)" || true
          git push

