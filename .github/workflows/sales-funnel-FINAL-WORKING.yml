name: 🎯 SunnySeeds Sales Funnel Auto-Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install openpyxl requests
      
      - name: Fetch Typeform and update Excel
        env:
          TYPEFORM_API_KEY: ${{ secrets.TYPEFORM_API_KEY }}
          TYPEFORM_FORM_ID: ${{ secrets.TYPEFORM_FORM_ID }}
        run: python scripts/1_fetch_typeform_leads.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dashboards/
          git pull origin main --no-edit || true
          git commit -m "Auto-update Sales Funnel Dashboard" || true
          git push origin main

